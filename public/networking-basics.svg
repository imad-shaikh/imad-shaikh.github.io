    <path d="M80 80h80M120 40c18 18 18 62 0 80M120 40c-18 18-18 62 0 80" stroke="#4b8fe6" stroke-width="6"/>
    <rect x="18" y="142" width="204" height="18" rx="9" fill="#6b7280"/>
  </g>

  <g transform="translate(385 355)">
