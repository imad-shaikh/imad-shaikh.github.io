<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Networking Basics</title>
  <desc id="desc">A diagram showing a device sending data through a router and the internet to a web server and website, with return arrows below.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f9fb"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#dfeaf7"/>
    </linearGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4453"/>
      <stop offset="1" stop-color="#242b35"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f8fe"/>
      <stop offset="1" stop-color="#e7eef8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#395b83"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font-size: 34px; font-weight: 700; }
      .sub { font-size: 22px; fill: #4b5563; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g stroke="#395b83" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M332 455h62" marker-end="url(#arrow)"/>
    <path d="M630 455h60" marker-end="url(#arrow)"/>
    <path d="M968 455h62" marker-end="url(#arrow)"/>
    <path d="M1320 455h60" marker-end="url(#arrow)"/>
    <path d="M1340 620h-170"/>
    <path d="M1042 620H882"/>
    <path d="M680 620H520"/>
    <path d="M320 620H160"/>
    <path d="M160 620h-24" marker-end="url(#arrow)"/>
    <path d="M520 620h-24" marker-end="url(#arrow)"/>
    <path d="M882 620h-24" marker-end="url(#arrow)"/>
    <path d="M1220 620h-24" marker-end="url(#arrow)"/>
  </g>

  <text x="190" y="318" text-anchor="middle" class="label">Your Device</text>
  <text x="500" y="318" text-anchor="middle" class="label">Router</text>
  <text x="800" y="318" text-anchor="middle" class="label">Internet</text>
  <text x="1140" y="318" text-anchor="middle" class="label">Web Server</text>
  <text x="1440" y="318" text-anchor="middle" class="label">Website</text>

