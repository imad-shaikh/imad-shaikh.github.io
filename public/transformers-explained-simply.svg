<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How a Transformer GPT Works</title>
  <desc id="desc">A high-level diagram showing input text moving through tokenization, embeddings, transformer layers, final vector, unembedding, softmax, and next-token probabilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.55" stop-color="#f4f8fb"/>
      <stop offset="1" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#ecf9e8"/><stop offset="1" stop-color="#f7fcf4"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#e3f1fc"/><stop offset="1" stop-color="#f4faff"/></linearGradient>
    <linearGradient id="purple" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#eee2fb"/><stop offset="1" stop-color="#faf6ff"/></linearGradient>
    <linearGradient id="yellow" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#fff2cc"/><stop offset="1" stop-color="#fffaf0"/></linearGradient>
    <linearGradient id="pink" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#fde5e7"/><stop offset="1" stop-color="#fff6f7"/></linearGradient>
    <linearGradient id="teal" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#dff5f3"/><stop offset="1" stop-color="#f5fffd"/></linearGradient>
    <linearGradient id="softBlue" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#dfeffc"/><stop offset="1" stop-color="#f4faff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#6d7d8a" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#111827"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#101820}
      .label{font-size:19px;font-weight:700}
      .small{font-size:15px}
      .body{font-size:19px}
      .token{fill:#f8fbff;stroke:#2e87df;stroke-width:1.5}
      .dot{fill:#8d68bd}
      .line{stroke:#111827;stroke-width:2.2;marker-end:url(#arrow)}
      .panel{filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" text-anchor="middle" font-size="58" font-weight="800">How a Transformer (GPT) Works</text>
  <text x="800" y="132" text-anchor="middle" font-size="30">High-level overview of the process</text>

  <g class="panel">
    <rect x="30" y="322" width="170" height="260" rx="14" fill="url(#green)" stroke="#a9d69f"/>
    <text x="115" y="362" text-anchor="middle" class="label">1. Input Text</text>
    <text x="115" y="466" text-anchor="middle" class="body"><tspan x="115">"The cat sat on</tspan><tspan x="115" dy="32">the mat"</tspan></text>
  </g>
  <path class="line" d="M208 452h38"/>

  <g class="panel">
    <rect x="250" y="190" width="170" height="525" rx="18" fill="url(#blue)"/>
    <text x="335" y="232" text-anchor="middle" class="label">2. Tokenization</text>
    <g font-size="23" font-weight="700">
      <rect class="token" x="290" y="314" width="68" height="48" rx="4"/><text x="324" y="346" text-anchor="middle">The</text>
      <rect class="token" x="290" y="374" width="68" height="48" rx="4"/><text x="324" y="406" text-anchor="middle">cat</text>
      <rect class="token" x="290" y="434" width="68" height="48" rx="4"/><text x="324" y="466" text-anchor="middle">sat</text>
      <rect class="token" x="290" y="494" width="68" height="48" rx="4"/><text x="324" y="526" text-anchor="middle">on</text>
      <rect class="token" x="290" y="554" width="68" height="48" rx="4"/><text x="324" y="586" text-anchor="middle">the</text>
      <rect class="token" x="290" y="614" width="68" height="48" rx="4"/><text x="324" y="646" text-anchor="middle">mat</text>
    </g>
  </g>

  <g class="panel">
    <rect x="445" y="190" width="195" height="525" rx="18" fill="url(#purple)"/>
    <text x="542" y="224" text-anchor="middle" class="label">3. Embedding</text>
    <text x="542" y="251" text-anchor="middle" class="small">(Transform tokens</text>
    <text x="542" y="278" text-anchor="middle" class="small">into vectors)</text>
    <g stroke="#8d68bd" stroke-width="2" fill="#f9f6ff">
      <rect x="470" y="324" width="145" height="25"/>
      <rect x="470" y="384" width="145" height="25"/>
      <rect x="470" y="444" width="145" height="25"/>
      <rect x="470" y="504" width="145" height="25"/>
      <rect x="470" y="564" width="145" height="25"/>
      <rect x="470" y="624" width="145" height="25"/>
    </g>
    <g>
      <circle class="dot" cx="486" cy="337" r="6"/><circle class="dot" cx="516" cy="337" r="6"/><circle class="dot" cx="546" cy="337" r="6"/><circle class="dot" cx="576" cy="337" r="6"/><circle class="dot" cx="606" cy="337" r="6"/>
      <circle class="dot" cx="486" cy="397" r="6"/><circle class="dot" cx="516" cy="397" r="6"/><circle class="dot" cx="546" cy="397" r="6"/><circle class="dot" cx="576" cy="397" r="6"/><circle class="dot" cx="606" cy="397" r="6"/>
      <circle class="dot" cx="486" cy="457" r="6"/><circle class="dot" cx="516" cy="457" r="6"/><circle class="dot" cx="546" cy="457" r="6"/><circle class="dot" cx="576" cy="457" r="6"/><circle class="dot" cx="606" cy="457" r="6"/>
      <circle class="dot" cx="486" cy="517" r="6"/><circle class="dot" cx="516" cy="517" r="6"/><circle class="dot" cx="546" cy="517" r="6"/><circle class="dot" cx="576" cy="517" r="6"/><circle class="dot" cx="606" cy="517" r="6"/>
      <circle class="dot" cx="486" cy="577" r="6"/><circle class="dot" cx="516" cy="577" r="6"/><circle class="dot" cx="546" cy="577" r="6"/><circle class="dot" cx="576" cy="577" r="6"/><circle class="dot" cx="606" cy="577" r="6"/>
      <circle class="dot" cx="486" cy="637" r="6"/><circle class="dot" cx="516" cy="637" r="6"/><circle class="dot" cx="546" cy="637" r="6"/><circle class="dot" cx="576" cy="637" r="6"/><circle class="dot" cx="606" cy="637" r="6"/>
    </g>
  </g>

  <g stroke="#111827" stroke-width="2" marker-end="url(#arrow)">
    <path d="M360 338h66"/><path d="M360 398h66"/><path d="M360 458h66"/><path d="M360 518h66"/><path d="M360 578h66"/><path d="M360 638h66"/>
  </g>

  <g class="panel">
    <rect x="665" y="190" width="275" height="525" rx="18" fill="url(#yellow)"/>
    <text x="802" y="224" text-anchor="middle" class="label">4. Transformer Layers</text>
    <text x="802" y="252" text-anchor="middle" class="label">(Repeated N times)</text>
    <rect x="690" y="306" width="225" height="128" rx="10" fill="#fffaf0" stroke="#d7a31b" stroke-width="1.5"/>
    <text x="802" y="338" text-anchor="middle" class="label">Attention Layer</text>
    <g stroke="#111827" stroke-width="2" fill="#fff5cc">
      <path d="M735 396l25-35 42 35 44-35 28 35M760 361l42 35M846 361l-44 35"/>
      <circle cx="735" cy="396" r="8"/><circle cx="760" cy="361" r="8"/><circle cx="802" cy="396" r="8"/><circle cx="846" cy="361" r="8"/><circle cx="874" cy="396" r="8"/>
    </g>
    <circle cx="802" cy="456" r="15" fill="#fff" stroke="#111827"/><text x="802" y="464" text-anchor="middle" font-size="24">+</text>
    <rect x="690" y="485" width="225" height="130" rx="10" fill="#fffaf0" stroke="#d7a31b" stroke-width="1.5"/>
    <text x="802" y="518" text-anchor="middle" class="label">Feed-Forward</text>
    <text x="802" y="548" text-anchor="middle" class="label">Layer</text>
    <g stroke="#111827" stroke-width="2" fill="#fff5cc">
      <path d="M765 580l34 20 33-20M765 580v42M832 580v42"/>
      <circle cx="765" cy="580" r="7"/><circle cx="799" cy="600" r="7"/><circle cx="832" cy="580" r="7"/><circle cx="765" cy="622" r="7"/><circle cx="832" cy="622" r="7"/>
    </g>
    <circle cx="802" cy="650" r="15" fill="#fff" stroke="#111827"/><text x="802" y="658" text-anchor="middle" font-size="24">+</text>
    <text x="802" y="690" text-anchor="middle" class="body">... Repeat ...</text>
  </g>
  <path class="line" d="M640 452h25"/>

  <g class="panel">
    <rect x="965" y="190" width="145" height="525" rx="18" fill="url(#pink)"/>
    <text x="1037" y="224" text-anchor="middle" class="label">5. Final Vector</text>
    <text x="1037" y="254" text-anchor="middle" class="small">(Last token's</text>
    <text x="1037" y="282" text-anchor="middle" class="small">representation)</text>
    <rect x="1022" y="360" width="30" height="240" fill="#fff6f7" stroke="#d45b66"/>
    <g fill="#e68c96">
      <circle cx="1037" cy="377" r="7"/><circle cx="1037" cy="411" r="7"/><circle cx="1037" cy="445" r="7"/><circle cx="1037" cy="479" r="7"/><circle cx="1037" cy="513" r="7"/><circle cx="1037" cy="547" r="7"/><circle cx="1037" cy="581" r="7"/>
    </g>
  </g>
  <path class="line" d="M940 452h25"/>

  <g class="panel">
    <rect x="1140" y="190" width="160" height="525" rx="18" fill="url(#teal)"/>
    <text x="1220" y="224" text-anchor="middle" class="label">6. Unembedding</text>
    <text x="1220" y="254" text-anchor="middle" class="small">(Map to vocabulary</text>
    <text x="1220" y="282" text-anchor="middle" class="small">scores)</text>
    <g font-size="19" text-anchor="middle">
      <rect x="1187" y="316" width="68" height="352" fill="#f4fffd" stroke="#32a99f"/>
      <path d="M1187 361h68M1187 406h68M1187 451h68M1187 496h68M1187 541h68M1187 586h68M1187 631h68" stroke="#32a99f"/>
      <text x="1221" y="344">0.02</text><text x="1221" y="389">0.01</text><text x="1221" y="434">0.15</text><text x="1221" y="479">...</text><text x="1221" y="524">2.51</text><text x="1221" y="569">0.03</text><text x="1221" y="614">...</text><text x="1221" y="659">0.09</text>
    </g>
  </g>
  <path class="line" d="M1110 452h30"/>

  <g class="panel">
    <rect x="1322" y="190" width="120" height="525" rx="18" fill="url(#softBlue)"/>
    <text x="1382" y="224" text-anchor="middle" class="label">7. Softmax</text>
    <text x="1382" y="254" text-anchor="middle" class="small">(Convert to</text>
    <text x="1382" y="282" text-anchor="middle" class="small">probabilities)</text>
    <g font-size="18" text-anchor="middle">
      <rect x="1345" y="316" width="72" height="352" fill="#f5fbff" stroke="#2e87df"/>
      <path d="M1345 361h72M1345 406h72M1345 451h72M1345 496h72M1345 541h72M1345 586h72M1345 631h72" stroke="#2e87df"/>
      <rect x="1346" y="496" width="70" height="45" fill="#66b3ff"/>
      <text x="1381" y="344">0.001</text><text x="1381" y="389">0.0005</text><text x="1381" y="434">0.006</text><text x="1381" y="479">...</text><text x="1381" y="524" fill="#fff" font-weight="700">0.71</text><text x="1381" y="569">0.001</text><text x="1381" y="614">...</text><text x="1381" y="659">0.002</text>
    </g>
  </g>
  <path class="line" d="M1300 452h22"/>
  <path class="line" d="M1442 452h42"/>
  <text x="1488" y="451" class="body"><tspan x="1488">Next token</tspan><tspan x="1488" dy="28">probabilities</tspan></text>

  <rect x="30" y="760" width="1415" height="110" rx="18" fill="#f2f4f6" opacity=".95"/>
  <g font-size="21" text-anchor="middle">
    <text x="100" y="838">Text Input</text><text x="292" y="838">Break into<tspan x="292" dy="26">Tokens</tspan></text><text x="500" y="838">Convert to<tspan x="500" dy="26">Vectors</tspan></text><text x="800" y="838">Process with<tspan x="800" dy="26">Transformer Layers</tspan></text><text x="1038" y="838">Get Final<tspan x="1038" dy="26">Vector</tspan></text><text x="1220" y="838">Map to<tspan x="1220" dy="26">Vocabulary Scores</tspan></text><text x="1382" y="838">Convert to<tspan x="1382" dy="26">Probabilities</tspan></text>
  </g>
  <g stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)">
    <path d="M165 802h55"/><path d="M365 802h55"/><path d="M590 802h70"/><path d="M935 802h55"/><path d="M1098 802h55"/><path d="M1282 802h45"/>
  </g>
  <rect x="443" y="785" width="80" height="25" fill="#f9f6ff" stroke="#8d68bd"/>
  <circle class="dot" cx="460" cy="798" r="5"/><circle class="dot" cx="485" cy="798" r="5"/><circle class="dot" cx="510" cy="798" r="5"/>
  <rect x="763" y="775" width="78" height="50" rx="5" fill="#fffaf0" stroke="#111827"/><path d="M763 790h78M763 806h78" stroke="#111827"/>
  <rect x="1018" y="777" width="20" height="60" fill="#fff6f7" stroke="#d45b66"/><circle cx="1028" cy="790" r="5" fill="#e68c96"/><circle cx="1028" cy="812" r="5" fill="#e68c96"/>
  <path d="M1186 834h60v-54M1206 834v-35M1226 834v-20" stroke="#111827" fill="none"/>
  <path d="M1348 834v-35h16v35M1375 834v-60h16v60M1402 834v-45h16v45" stroke="#111827" fill="#b8f0f0"/>
  <rect x="435" y="894" width="720" height="52" rx="16" fill="#f0f2f4"/>
  <text x="795" y="929" text-anchor="middle" font-size="24">The model predicts the next token based on context.</text>
</svg>
